<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #ffffff; margin: 0; padding: 20px; font-family: Arial, sans-serif; }
  svg text { font-family: Arial, sans-serif; }
</style>
</head>
<body>
<svg width="860" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="860" height="440" fill="#ffffff"/>

<!-- ── LAYER TITLES ── -->
<text x="90"  y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Input Layer</text>
<text x="90"  y="44" text-anchor="middle" font-size="11" fill="#888">784 neurons</text>

<text x="310" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B4FCF">Hidden Layer</text>
<text x="310" y="44" text-anchor="middle" font-size="11" fill="#888">128 neurons</text>

<text x="560" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F6E56">Output Layer</text>
<text x="560" y="44" text-anchor="middle" font-size="11" fill="#888">10 neurons</text>

<!-- ── INPUT NEURONS ── -->
<circle cx="90" cy="80"  r="18" fill="#f5f5f5" stroke="#aaa" stroke-width="1.2"/>
<text x="90" y="84" text-anchor="middle" font-size="11" fill="#555">x₁</text>

<circle cx="90" cy="135" r="18" fill="#f5f5f5" stroke="#aaa" stroke-width="1.2"/>
<text x="90" y="139" text-anchor="middle" font-size="11" fill="#555">x₂</text>

<circle cx="90" cy="190" r="18" fill="#f5f5f5" stroke="#aaa" stroke-width="1.2"/>
<text x="90" y="194" text-anchor="middle" font-size="11" fill="#555">x₃</text>

<circle cx="90" cy="233" r="3" fill="#aaa"/>
<circle cx="90" cy="248" r="3" fill="#aaa"/>
<circle cx="90" cy="263" r="3" fill="#aaa"/>

<circle cx="90" cy="305" r="18" fill="#f5f5f5" stroke="#aaa" stroke-width="1.2"/>
<text x="90" y="309" text-anchor="middle" font-size="10" fill="#555">x₇₈₄</text>

<!-- ── WEIGHT CONNECTIONS input → hidden (faint) ── -->
<g opacity="0.12" stroke="#555" stroke-width="0.7" fill="none">
  <line x1="108" y1="80"  x2="270" y2="110"/>
  <line x1="108" y1="80"  x2="270" y2="185"/>
  <line x1="108" y1="80"  x2="270" y2="260"/>
  <line x1="108" y1="80"  x2="270" y2="310"/>
  <line x1="108" y1="135" x2="270" y2="110"/>
  <line x1="108" y1="135" x2="270" y2="185"/>
  <line x1="108" y1="135" x2="270" y2="260"/>
  <line x1="108" y1="135" x2="270" y2="310"/>
  <line x1="108" y1="190" x2="270" y2="110"/>
  <line x1="108" y1="190" x2="270" y2="185"/>
  <line x1="108" y1="190" x2="270" y2="260"/>
  <line x1="108" y1="190" x2="270" y2="310"/>
  <line x1="108" y1="305" x2="270" y2="110"/>
  <line x1="108" y1="305" x2="270" y2="185"/>
  <line x1="108" y1="305" x2="270" y2="260"/>
  <line x1="108" y1="305" x2="270" y2="310"/>
</g>

<!-- W1 label -->
<text x="180" y="168" text-anchor="middle" font-size="11" fill="#888">W⁽¹⁾, b⁽¹⁾</text>

<!-- ── HIDDEN NEURONS ── -->
<circle cx="310" cy="110" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="310" y="106" text-anchor="middle" font-size="9" fill="#3C3489">z = Σwx+b</text>
<text x="310" y="119" text-anchor="middle" font-size="9" font-weight="bold" fill="#534AB7">ReLU</text>

<circle cx="310" cy="185" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="310" y="181" text-anchor="middle" font-size="9" fill="#3C3489">z = Σwx+b</text>
<text x="310" y="194" text-anchor="middle" font-size="9" font-weight="bold" fill="#534AB7">ReLU</text>

<circle cx="310" cy="228" r="3.5" fill="#7F77DD"/>
<circle cx="310" cy="243" r="3.5" fill="#7F77DD"/>
<circle cx="310" cy="258" r="3.5" fill="#7F77DD"/>

<circle cx="310" cy="295" r="22" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="310" y="291" text-anchor="middle" font-size="9" fill="#3C3489">z = Σwx+b</text>
<text x="310" y="304" text-anchor="middle" font-size="9" font-weight="bold" fill="#534AB7">ReLU</text>

<!-- ── DROPOUT BOX ── -->
<rect x="350" y="183" width="80" height="36" rx="8" fill="#FFF3CD" stroke="#D4A017" stroke-width="1.2"/>
<text x="390" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">Dropout</text>
<text x="390" y="212" text-anchor="middle" font-size="10" fill="#856404">p = 0.20</text>

<line x1="332" y1="200" x2="350" y2="200" stroke="#D4A017" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="430" y1="200" x2="450" y2="200" stroke="#D4A017" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ── WEIGHT CONNECTIONS hidden → output (faint) ── -->
<g opacity="0.12" stroke="#555" stroke-width="0.7" fill="none">
  <line x1="332" y1="110" x2="520" y2="110"/>
  <line x1="332" y1="110" x2="520" y2="165"/>
  <line x1="332" y1="110" x2="520" y2="220"/>
  <line x1="332" y1="110" x2="520" y2="330"/>
  <line x1="332" y1="185" x2="520" y2="110"/>
  <line x1="332" y1="185" x2="520" y2="165"/>
  <line x1="332" y1="185" x2="520" y2="275"/>
  <line x1="332" y1="185" x2="520" y2="330"/>
  <line x1="332" y1="295" x2="520" y2="165"/>
  <line x1="332" y1="295" x2="520" y2="220"/>
  <line x1="332" y1="295" x2="520" y2="275"/>
  <line x1="332" y1="295" x2="520" y2="330"/>
</g>

<!-- W2 label -->
<text x="468" y="168" text-anchor="middle" font-size="11" fill="#888">W⁽²⁾, b⁽²⁾</text>

<!-- ── OUTPUT NEURONS ── -->
<circle cx="560" cy="80"  r="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="560" y="84" text-anchor="middle" font-size="12" fill="#085041">0</text>

<circle cx="560" cy="130" r="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="560" y="134" text-anchor="middle" font-size="12" fill="#085041">1</text>

<circle cx="560" cy="180" r="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="560" y="184" text-anchor="middle" font-size="12" fill="#085041">2</text>

<circle cx="560" cy="223" r="3.5" fill="#0F6E56"/>
<circle cx="560" cy="238" r="3.5" fill="#0F6E56"/>
<circle cx="560" cy="253" r="3.5" fill="#0F6E56"/>

<circle cx="560" cy="280" r="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="560" y="284" text-anchor="middle" font-size="12" fill="#085041">9</text>

<!-- ── SOFTMAX BOX ── -->
<rect x="600" y="165" width="84" height="36" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="642" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Softmax</text>
<text x="642" y="194" text-anchor="middle" font-size="10" fill="#0F6E56">eᶻⁱ / Σeᶻʲ</text>

<line x1="580" y1="183" x2="600" y2="183" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ── FINAL OUTPUT ── -->
<rect x="704" y="152" width="110" height="62" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="759" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">ŷ ∈ ℝ¹⁰</text>
<text x="759" y="189" text-anchor="middle" font-size="10" fill="#0F6E56">P(class = k)</text>
<text x="759" y="205" text-anchor="middle" font-size="10" fill="#0F6E56">Σ ŷᵢ = 1</text>

<line x1="684" y1="183" x2="704" y2="183" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ── BOTTOM FORMULA BAR ── -->
<rect x="40" y="358" width="780" height="64" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
<text x="430" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Forward Pass:</text>
<text x="430" y="396" text-anchor="middle" font-size="11" fill="#555">x  →  z⁽¹⁾ = W⁽¹⁾x + b⁽¹⁾  →  a⁽¹⁾ = ReLU(z⁽¹⁾)  →  Dropout  →  z⁽²⁾ = W⁽²⁾a⁽¹⁾ + b⁽²⁾  →  ŷ = Softmax(z⁽²⁾)</text>
<text x="430" y="413" text-anchor="middle" font-size="11" fill="#555">Loss: ℒ = −log(ŷ_true)   |   Backprop output gradient: δ = ŷ − y   |   Params: 101,770</text>

</svg>
</body>
</html>
